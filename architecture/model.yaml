    reason: "User explicitly requires sender/admin experience for documents, templates, recipients, and tracking."

  - id: "ev-req-signer"
    path: "plan://requirements/signer-flow"
    kind: "plan_requirement"
    strength: "high"
    reason: "User explicitly requires public signer flow entered from email magic links."

  - id: "ev-req-webhook"
    path: "plan://requirements/webhooks"
    kind: "plan_requirement"
    strength: "high"
    reason: "User explicitly requires webhook callbacks into customer systems on document/signature state changes."

  - id: "ev-req-audit"
    path: "plan://requirements/audit-trail"
    kind: "plan_requirement"
    strength: "high"
    reason: "User explicitly requires an immutable audit trail for every signature event and important document transition."

  - id: "ev-req-rbac"
    path: "plan://requirements/security"
    kind: "plan_requirement"
    strength: "high"
    reason: "User explicitly requires admin isolation, RBAC, and reasonable B2B security defaults."

  - id: "ev-req-async-reliability"
    path: "plan://requirements/async-reliability"
    kind: "plan_requirement"
    strength: "high"
    reason: "User explicitly requires pragmatic reliability for notifications, webhooks, and audit/event processing."

  - id: "ev-req-data-ownership"
    path: "plan://requirements/data-ownership"
    kind: "plan_requirement"
    strength: "high"
    reason: "User explicitly requires clear ownership of source-of-truth data and clean async vs request boundaries."

  - id: "ev-con-team"
    path: "plan://constraints/team-size"
    kind: "plan_constraint"
    strength: "high"
    reason: "User stated team is 5 engineers."

  - id: "ev-con-timeline"
    path: "plan://constraints/timeline"
    kind: "plan_constraint"
    strength: "high"
    reason: "User stated 10-week target for credible MVP."

  - id: "ev-con-tenancy"
    path: "plan://constraints/multi-tenant"
    kind: "plan_constraint"
    strength: "high"
    reason: "User stated the product is multi-tenant B2B."

  - id: "ev-asm-stack"
    path: "plan://assumptions/stack"
    kind: "plan_assumption"
    strength: "medium"
    reason: "Documented assumption: TypeScript monorepo with Next.js + per-concern Node worker pools for shared types and team velocity."

  - id: "ev-asm-compliance"
    path: "plan://assumptions/compliance-bar"
    kind: "plan_assumption"
    strength: "medium"
    reason: "Documented assumption: ESIGN/UETA only at MVP; eIDAS QES and 21 CFR Part 11 explicitly out of scope."

  - id: "ev-asm-region"
    path: "plan://assumptions/region"
    kind: "plan_assumption"
    strength: "medium"
    reason: "Documented assumption: single-region US deployment at launch."

  - id: "ev-asm-auth-vendor"
    path: "plan://assumptions/auth-vendor"
    kind: "plan_assumption"
    strength: "medium"
    reason: "Documented assumption: WorkOS for SSO/SCIM."

  - id: "ev-asm-email-vendor"
    path: "plan://assumptions/email-vendor"
    kind: "plan_assumption"
    strength: "medium"
    reason: "Documented assumption: Postmark or Resend for transactional email."

  - id: "ev-trd-monolith"
    path: "plan://tradeoffs/monolith-and-pools"
    kind: "plan_tradeoff"
    strength: "high"
    reason: "Recommended default: modular monolith for the web tier plus four concern-specific worker pools (pdf-sealing, webhook-delivery, audit, notifications) — splitting async runtimes by failure mode and resource profile while keeping the request path one deployable."

  - id: "ev-trd-tenancy"
    path: "plan://tradeoffs/tenancy-model"
    kind: "plan_tradeoff"
    strength: "high"
    reason: "Recommended default: shared schema with tenant_id and RLS backstop over schema-per-tenant."

  - id: "ev-trd-queue"
    path: "plan://tradeoffs/queue-choice"
    kind: "plan_tradeoff"
    strength: "high"
    reason: "Recommended default: Postgres-backed queue (one logical queue per concern) over Redis for transactional enqueue and one-fewer-system simplicity."

  - id: "ev-trd-audit"
    path: "plan://tradeoffs/audit-store"
    kind: "plan_tradeoff"
    strength: "high"
    reason: "Recommended default: append-only hash-chained audit_events table with a single async-path writer (audit pool) over a separate event store."

