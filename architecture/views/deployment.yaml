version: 2
id: "view-deployment"
type: "deployment"
title: "Deployment View — Single-Region MVP Topology with Per-Pool Worker Compute"
audience:
  - "senior_architects"
purpose: "Show the deployment topology at MVP — edge, web compute, four per-pool worker compute nodes, and managed Postgres."
scope: "Single-region production deployment for the credible MVP."
source_model: "architecture/model.yaml"
element_ids:
  - "container-web"
  - "container-pdf-pool"
  - "container-webhook-pool"
  - "container-audit-pool"
  - "container-notifications-pool"
  - "container-postgres"
relationship_ids:
  - "rel-edge-routes-app"
  - "rel-app-deploys-web"
  - "rel-pdf-pool-deploys"
  - "rel-webhook-pool-deploys"
  - "rel-audit-pool-deploys"
  - "rel-notifications-pool-deploys"
  - "rel-pg-deploys-db-node"
deployment_node_ids:
  - "node-edge"
  - "node-app"
  - "node-worker-pdf"
  - "node-worker-webhook"
  - "node-worker-audit"
  - "node-worker-notifications"
  - "node-db"
placement:
  - node_id: "node-app"
    element_id: "container-web"
  - node_id: "node-worker-pdf"
    element_id: "container-pdf-pool"
  - node_id: "node-worker-webhook"
    element_id: "container-webhook-pool"
  - node_id: "node-worker-audit"
    element_id: "container-audit-pool"
  - node_id: "node-worker-notifications"
    element_id: "container-notifications-pool"
  - node_id: "node-db"
    element_id: "container-postgres"
assumptions:
  - text: "Single region (US) for MVP; multi-region is explicitly post-MVP."
    confidence: "strong_inference"
  - text: "Fly.io or Render is the default hosting target unless an enterprise design partner requires AWS/VPC."
    confidence: "weak_inference"
  - text: "Per-pool autoscaling matches the workload shape: CPU-tuned machines for sealing, plenty of small machines for webhook fanout, small isolated pool for audit, small low-cost pool for notifications."
    confidence: "strong_inference"
unknowns:
  - "Final cloud target — Fly/Render vs AWS — pending procurement constraints from early customers."
notes:
  - "Object storage (S3/R2) is an external managed dependency and is shown in container/system-context views rather than as a deployment node here."
  - "PG snapshot + PITR retention is 7-14 days; S3 versioning + lifecycle handles blob recovery."
  - "Audit compute carries stricter monitoring and alert-on-error; webhook compute carries per-tenant rate limits and egress allowlists."
