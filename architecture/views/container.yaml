version: 2
id: "view-container"
type: "container"
title: "Container View — Web + Four Worker Pools + Postgres"
audience:
  - "senior_architects"
  - "new_hires"
purpose: "Show the runtime units of the platform — one web tier plus four concern-specific worker pools — where canonical state lives, and how sync vs async work flows."
scope: "Document Signing Platform internals plus directly-coupled external systems."
source_model: "architecture/model.yaml"
element_ids:
  - "person-admin"
  - "person-signer"
  - "person-developer"
  - "container-web"
  - "container-pdf-pool"
  - "container-webhook-pool"
  - "container-audit-pool"
  - "container-notifications-pool"
  - "container-postgres"
  - "ext-workos"
  - "ext-email"
  - "ext-s3"
  - "ext-customer-system"
relationship_ids:
  - "rel-admin-to-web"
  - "rel-signer-to-web"
  - "rel-developer-to-web"
  - "rel-web-to-workos"
  - "rel-web-to-postgres"
  - "rel-web-to-s3"
  - "rel-web-enqueues-jobs"
  - "rel-pdf-pool-to-postgres"
  - "rel-pdf-pool-to-s3"
  - "rel-pdf-pool-to-audit-queue"
  - "rel-webhook-pool-to-postgres"
  - "rel-webhook-pool-to-customer"
  - "rel-webhook-pool-to-audit-queue"
  - "rel-audit-pool-to-postgres"
  - "rel-notifications-pool-to-postgres"
  - "rel-notifications-pool-to-email"
  - "rel-notifications-pool-to-audit-queue"
assumptions:
  - text: "Splitting async runtimes by concern (CPU vs retry-heavy I/O vs compliance vs notifications) is the right level of separation for MVP — same code/repo, different queue subscriptions and scaling profiles."
    confidence: "strong_inference"
unknowns:
  - "Whether a Redis cache is added later for hot reads or session storage."
  - "Whether webhook delivery later splits further (e.g. dedicated pool per priority class)."
notes:
  - "Web enqueues jobs in the same transaction as business writes — no dual-write."
  - "The webhook-delivery pool is the only worker with arbitrary outbound egress."
  - "All async-path audit appends are routed through the audit pool to preserve per-document chain ordering under a single writer."
