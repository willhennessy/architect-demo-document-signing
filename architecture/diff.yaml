notes:
  - "Driver: review feedback on the diagram (comp-job-runner) — split the single worker by failure mode and resource profile."
  - "Container split: the former `container-worker` becomes four containers (pdf-sealing, webhook-delivery, audit, notifications). Each has its own pg-boss job runner. Existing handler component IDs are preserved; only their parent_id changed."
  - "Audit ownership: a new `comp-audit-async-appender` in the audit pool is the single writer for async-path audit_events; sync-path appends still flow through `comp-audit-writer` inside the web monolith."
  - "Deployment: `node-worker` replaced by four per-pool compute nodes; per-pool autoscaling matches the workload shape."
  - "Stable IDs preserved across the revision for unchanged web-tier components, services, and external systems."
