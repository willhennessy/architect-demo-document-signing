assumptions:
  - text: "Team will ship a TypeScript monorepo (Next.js web + per-concern Node worker pools) — chosen for shared types and team velocity at 5 engineers."
    confidence: "strong_inference"
  - text: "ESIGN/UETA is the compliance bar at MVP; eIDAS QES and 21 CFR Part 11 are explicitly out of scope."
