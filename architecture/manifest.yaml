overall_summary: "Modular monolith (Next.js) for the request path, plus four concern-specific background worker pools (pdf-sealing CPU-bound, webhook-delivery retry-heavy I/O, audit compliance-critical, notifications email/reminders). All pools share one Postgres source-of-truth which also hosts per-concern pg-boss queues, plus S3 for document blobs. WorkOS handles admin SSO; signers enter via single-use magic links scoped to one document. Audit appends from async paths are funneled through the audit pool to keep a single writer per document. Tenant isolation is row-level (tenant_id + RLS backstop); audit trail is an append-only hash-chained table enforced by a restricted DB role."
